<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardGate - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 100%; max-width: 350px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #475569; background: #334155; color: white; font-size: 1rem; }
        button { width: 96%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        .alert { background: #fee2e2; border: 1px solid #f87171; color: #ef4444; padding: 8px; font-size: 0.9rem; margin-bottom: 15px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>👮 GuardGate Portal</h2>
        <p style="color: #94a3b8; margin-bottom: 20px;">Checkpoint Infrastructure Authentication</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Officer Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Access Password" required>
            <button type="submit">Authenticate Session</button>
        </form>
    </div>
</body>
</html>
